<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pacific Coast Ponds Shop</title>
  <meta name="description" content="Shop professional pond supplies — pumps, filters, aeration, treatments and more. Shipped USPS direct to your door.">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://js.stripe.com">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal:       #1a5728;   /* forest green */
      --teal-mid:   #2d7b3a;   /* mid green */
      --teal-light: #2882c8;   /* sky blue */
      --cream:      #fdf7ec;
      --g100: #f5f1ea; --g200: #e8e0d4; --g400: #a89880;
      --g500: #7a6a54; --g700: #3a2e1e; --g900: #1c1208;
      --red:   #c0392b;
      --green: #2d7b3a;
      --rad:   .25rem;
      --sh:    0 1px 2px rgba(0,0,0,.06);
      --sh-md: 0 3px 10px rgba(0,0,0,.09);
    }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: var(--g900); background: #fff; line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; height: auto; display: block; }
    button { cursor: pointer; font-family: inherit; }
    input, select, textarea { font-family: inherit; font-size: inherit; }

    /* ── Layout ── */
    .wrap    { max-width: 1200px; margin: 0 auto; padding: 0 1.25rem; }
    .wrap-sm { max-width:  660px; margin: 0 auto; padding: 0 1.25rem; }

    /* ── Promo bar (sky blue — first color accent at top) ── */
    #ssBar {
      background: var(--teal-light);
      color: #fff; text-align: center;
      padding: .5rem 1rem; font-size: .8125rem; font-weight: 600;
    }
    #ssBar a { color: rgba(255,255,255,.85); text-decoration: underline; }
    #ssBar.hidden { display: none; }

    /* ── Header (forest green — second color block, sharp bottom edge) ── */
    #hdr {
      background: var(--teal); position: sticky; top: 0; z-index: 100;
      border-bottom: 4px solid var(--teal-light);
    }
    .hdr-inner {
      display: flex; align-items: center; justify-content: space-between;
      padding: .75rem 1.25rem; max-width: 1200px; margin: 0 auto;
    }
    .logo { display: flex; align-items: center; }
    .hdr-nav { display: flex; align-items: center; gap: 1.5rem; }
    .hdr-link { color: rgba(255,255,255,.8); font-size: .875rem; font-weight: 600; transition: color .15s; }
    .hdr-link:hover { color: #fff; }
    .cart-btn {
      background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2); color: #fff;
      padding: .5rem .875rem; border-radius: var(--rad);
      font-size: .875rem; font-weight: 700;
      display: flex; align-items: center; gap: .375rem;
      transition: background .15s;
    }
    .cart-btn:hover { background: rgba(255,255,255,.22); }
    .cart-badge {
      background: var(--teal-light); color: #fff;
      font-size: .7rem; font-weight: 800;
      width: 1.25rem; height: 1.25rem; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      line-height: 1;
    }

    /* ── Page root ── */
    #root { min-height: calc(100vh - 104px); }

    /* ── Hero (full-width green band — sharp block against white page) ── */
    .hero {
      background: var(--teal);
      color: #fff; padding: 2.5rem 1.25rem;
      border-bottom: 4px solid var(--teal-light);
    }
    .hero-inner { max-width: 1200px; margin: 0 auto; }
    .hero h1 { font-size: clamp(1.375rem, 3vw, 2rem); font-weight: 900; margin-bottom: .375rem; letter-spacing: -.02em; }
    .hero p { font-size: .9375rem; color: rgba(255,255,255,.78); max-width: 460px; margin: 0 0 1.25rem; }
    .hero .btn-primary { font-size: .875rem; padding: .625rem 1.375rem; }

    /* ── Buttons ── */
    .btn-primary {
      display: inline-block; background: var(--teal-light); color: #fff;
      padding: .75rem 1.75rem; border-radius: var(--rad);
      font-weight: 700; font-size: .9375rem; border: none;
      transition: filter .15s; cursor: pointer;
    }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-primary:disabled { background: var(--g400); cursor: not-allowed; filter: none; }
    .btn-outline {
      display: inline-block; background: transparent;
      border: 2px solid var(--teal); color: var(--teal);
      padding: .625rem 1.5rem; border-radius: var(--rad);
      font-weight: 600; font-size: .9375rem;
      transition: background .15s, color .15s; cursor: pointer;
    }
    .btn-outline:hover { background: var(--teal); color: #fff; }

    /* ── Section ── */
    .sec { padding: 2.5rem 0; }
    /* Section titles — green left bar accent */
    .sec-title {
      font-size: 1.375rem; font-weight: 800; color: var(--g900); margin-bottom: 1.25rem;
      border-left: 4px solid var(--teal); padding-left: .75rem;
    }

    /* ── Category grid ── */
    .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 1rem; }
    .cat-card {
      background: #fff; border-radius: var(--rad); padding: 1.25rem 1rem;
      text-align: center; border: 1px solid var(--g200);
      cursor: pointer; transition: border-color .15s, box-shadow .15s;
      border-top: 3px solid transparent;
    }
    .cat-card:hover { border-top-color: var(--teal); box-shadow: var(--sh-md); }
    .cat-icon { font-size: 1.875rem; margin-bottom: .5rem; }
    .cat-card h3 { font-size: .8125rem; font-weight: 700; color: var(--g700); line-height: 1.3; }

    /* ── Product grid ── */
    .prod-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .prod-card {
      background: #fff; border-radius: var(--rad); overflow: hidden;
      border: 1px solid var(--g200);
      border-top: 3px solid transparent;
      cursor: pointer; transition: border-color .18s, box-shadow .18s;
      display: flex; flex-direction: column;
    }
    .prod-card:hover { border-top-color: var(--teal); box-shadow: 0 4px 16px rgba(26,87,40,.12); }
    .prod-img {
      aspect-ratio: 1; background: var(--g100);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .prod-img img { width: 100%; height: 100%; object-fit: cover; }
    .prod-img-ph { font-size: 2.25rem; color: var(--g400); }
    .prod-body { padding: .875rem; flex: 1; display: flex; flex-direction: column; }
    .prod-brand { font-size: .6875rem; text-transform: uppercase; color: var(--g500); font-weight: 700; letter-spacing: .05em; margin-bottom: .25rem; }
    .prod-name { font-size: .9rem; font-weight: 600; color: var(--g900); line-height: 1.35; margin-bottom: auto; }
    .prod-foot { display: flex; align-items: center; justify-content: space-between; margin-top: .75rem; padding-top: .625rem; border-top: 1px solid var(--g100); }
    .prod-price { font-size: 1rem; font-weight: 800; color: var(--teal); }
    .prod-price-ss { color: var(--teal-light); }
    .badge-ss {
      background: #e8f0f8; color: var(--teal-light);
      font-size: .625rem; font-weight: 800; padding: .2rem .45rem;
      border-radius: 999px; border: 1px solid #a8c8e8;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .badge-oos {
      background: var(--g100); color: var(--g500);
      font-size: .625rem; font-weight: 800; padding: .2rem .45rem;
      border-radius: 999px;
    }
    .badge-freight {
      background: #fef3c7; color: #92400e;
      font-size: .625rem; font-weight: 800; padding: .2rem .45rem;
      border-radius: 999px;
    }

    /* Free shipping bar */
    .fs-progress { padding: .5rem 0 .25rem; }
    .fs-bar { height: 4px; background: #e5e7eb; border-radius: 2px; margin-bottom: .25rem; }
    .fs-fill { height: 4px; background: var(--teal); border-radius: 2px; transition: width .3s; }
    .fs-label { font-size: .72rem; color: #6b7280; text-align: center; }
    .freight-note { font-size: .72rem; color: #92400e; text-align: center; padding: .25rem 0; }

    /* Brand filter pills */
    .brand-pills { display: flex; flex-wrap: wrap; gap: .4rem; margin-bottom: 1rem; }
    .brand-pill {
      background: #f3f4f6; color: #374151; border: 1px solid #d1d5db;
      padding: .3rem .85rem; font-size: .8rem; font-weight: 600;
      border-radius: 99px; cursor: pointer; transition: all .15s;
    }
    .brand-pill:hover, .brand-pill.active { background: var(--teal); color: #fff; border-color: var(--teal); }
    .atc-sm {
      background: var(--teal); color: #fff; border: none;
      width: 1.875rem; height: 1.875rem; border-radius: 50%;
      font-size: 1.25rem; font-weight: 300;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s; flex-shrink: 0; line-height: 1;
    }
    .atc-sm:hover { background: var(--teal-mid); }
    .atc-sm:disabled { background: var(--g200); color: var(--g500); cursor: not-allowed; }

    /* ── Breadcrumb ── */
    .bc { display: flex; align-items: center; flex-wrap: wrap; gap: .375rem; font-size: .8125rem; color: var(--g500); margin-bottom: 1.25rem; }
    .bc a { color: var(--g500); } .bc a:hover { color: var(--teal); }
    .bc span { color: var(--g400); }

    /* ── Product detail ── */
    .pd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; align-items: start; }
    @media (max-width: 640px) { .pd-grid { grid-template-columns: 1fr; } }
    .pd-img {
      aspect-ratio: 1; background: var(--g100); border-radius: var(--rad);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
      border: 1px solid var(--g200);
    }
    .pd-img img { width: 100%; height: 100%; object-fit: cover; }
    .pd-img-ph { font-size: 5rem; color: var(--g400); }
    .pd-brand { font-size: .8rem; text-transform: uppercase; color: var(--g500); font-weight: 700; letter-spacing: .05em; margin-bottom: .5rem; }
    .pd-title { font-size: clamp(1.25rem, 2.5vw, 1.75rem); font-weight: 900; line-height: 1.2; margin-bottom: .75rem; letter-spacing: -.02em; }
    .pd-price-row { display: flex; align-items: baseline; gap: .625rem; margin-bottom: 1rem; }
    .pd-price { font-size: 1.75rem; font-weight: 900; color: var(--teal); }
    .pd-price-ss { font-size: 1.75rem; font-weight: 900; color: var(--teal-light); }
    .pd-price-orig { font-size: 1rem; text-decoration: line-through; color: var(--g400); }
    .ss-banner {
      background: #e8f0f8; border: 1px solid #a8c8e8; border-radius: var(--rad);
      padding: .625rem .875rem; font-size: .875rem; color: var(--teal-light); font-weight: 600;
      display: flex; align-items: center; gap: .5rem; margin-bottom: 1rem;
    }
    .pd-desc { color: var(--g700); font-size: .9375rem; line-height: 1.75; margin-bottom: 1.5rem; }
    .pd-desc p { margin-bottom: .875rem; }
    .pd-desc h4, .pd-sec-title { font-size: .8125rem; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: var(--teal-light); margin: 1.25rem 0 .5rem; }
    .pd-desc ul, .pd-feature-list { padding-left: 1.25rem; margin-bottom: .875rem; }
    .pd-desc ul li, .pd-feature-list li { margin-bottom: .25rem; }
    /* Spec tables */
    .pd-spec-table { width: 100%; border-collapse: separate; border-spacing: 0; margin-bottom: 1.25rem; font-size: .875rem; border: 1px solid var(--g200); border-radius: var(--rad); overflow: hidden; }
    .pd-spec-table th, .pd-spec-table td { padding: .5625rem .875rem; text-align: left; border-bottom: 1px solid var(--g200); }
    .pd-spec-table tr:last-child th, .pd-spec-table tr:last-child td { border-bottom: none; }
    .pd-spec-table th { background: var(--teal); color: #fff; font-weight: 700; width: 42%; white-space: nowrap; border-right: 1px solid rgba(255,255,255,.15); }
    .pd-spec-table td { background: #fff; color: var(--g900); }
    .pd-spec-table tr:nth-child(even) td { background: var(--g100); }
    .pd-spec-table tr:hover td { background: #e8f0f8; transition: background .1s; }
    .pd-spec-table thead th { background: #0e2e16; color: #fff; font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; font-weight: 700; width: auto; white-space: nowrap; border-right: 1px solid rgba(255,255,255,.18); border-bottom: 2px solid rgba(0,0,0,.2); }
    .pd-spec-table thead th:last-child { border-right: none; }
    .pd-spec-table thead + tbody tr:nth-child(even) td { background: var(--g100); }
    .pd-spec-table thead + tbody tr:nth-child(odd) td { background: #fff; }
    .pd-ingredients { font-size: .8125rem; color: var(--g500); line-height: 1.7; }
    .pd-video { margin: 1.25rem 0; border-radius: var(--rad); overflow: hidden; aspect-ratio: 16/9; }
    .pd-video iframe { width: 100%; height: 100%; border: none; }
    .qty-row { display: flex; align-items: center; gap: 1rem; margin-bottom: .875rem; }
    .qty-label { font-size: .8rem; text-transform: uppercase; font-weight: 700; color: var(--g500); }
    .qty-ctrl { display: flex; align-items: center; border: 1.5px solid var(--g200); border-radius: var(--rad); overflow: hidden; }
    .qty-ctrl button { background: var(--g100); border: none; width: 2.25rem; height: 2.25rem; font-size: 1.125rem; font-weight: 700; color: var(--g700); transition: background .15s; }
    .qty-ctrl button:hover { background: var(--g200); }
    .qty-ctrl input { width: 2.75rem; border: none; text-align: center; font-size: .9375rem; font-weight: 700; outline: none; background: #fff; }
    .btn-atc {
      background: var(--teal); color: #fff; border: none;
      padding: .875rem 2rem; border-radius: var(--rad);
      font-size: 1rem; font-weight: 700; width: 100%;
      transition: filter .15s;
    }
    .btn-atc:hover { filter: brightness(1.1); }
    .btn-atc:disabled { background: var(--g200); color: var(--g500); cursor: not-allowed; }
    .pd-meta { font-size: .8125rem; color: var(--g500); margin-top: .875rem; display: flex; gap: 1rem; flex-wrap: wrap; }

    /* ── Variants ── */
    .var-group { margin-bottom: 1rem; }
    .var-label { font-size: .8125rem; font-weight: 700; text-transform: uppercase; color: var(--g500); letter-spacing: .04em; margin-bottom: .5rem; }
    .var-pills { display: flex; flex-wrap: wrap; gap: .5rem; }
    .var-pill {
      padding: .4375rem .875rem; border-radius: var(--rad); font-size: .875rem; font-weight: 600;
      border: 2px solid var(--g200); background: #fff; color: var(--g700); transition: border-color .15s, background .15s;
    }
    .var-pill:hover { border-color: var(--teal-light); }
    .var-pill.selected { border-color: var(--teal); background: var(--teal); color: #fff; }
    .var-pill.oos { opacity: .45; cursor: not-allowed; text-decoration: line-through; }
    .cart-item-var { font-size: .8rem; color: var(--g500); display: block; margin-top: .1rem; }

    /* ── Sub-category pills ── */
    .sub-pills { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 1.75rem; }
    .sub-pill { padding: .375rem .875rem; border-radius: 2rem; background: #fff; border: 1.5px solid var(--g200); font-size: .875rem; font-weight: 600; color: var(--g700); transition: background .15s, border-color .15s, color .15s; }
    .sub-pill:hover { background: var(--teal); border-color: var(--teal); color: #fff; }
    .sub-pill.active { background: var(--teal); border-color: var(--teal); color: #fff; }

    /* ── Cart ── */
    .cart-empty { text-align: center; padding: 5rem 1rem; color: var(--g500); }
    .cart-empty-icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .cart-empty h2 { font-size: 1.25rem; font-weight: 800; color: var(--g700); margin-bottom: .5rem; }
    .cart-layout { display: grid; grid-template-columns: 1fr 320px; gap: 2rem; align-items: start; }
    @media (max-width: 768px) { .cart-layout { grid-template-columns: 1fr; } }
    .cart-item { display: flex; align-items: center; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid var(--g200); }
    .cart-item-img { width: 4.5rem; height: 4.5rem; border-radius: var(--rad); background: var(--g100); overflow: hidden; flex-shrink: 0; }
    .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .cart-item-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name { font-weight: 700; font-size: .9375rem; margin-bottom: .2rem; }
    .cart-item-sub { font-size: .875rem; color: var(--g500); }
    .cart-item-rm { background: none; border: none; color: var(--g400); font-size: .8125rem; text-decoration: underline; padding: 0; margin-top: .25rem; transition: color .15s; }
    .cart-item-rm:hover { color: var(--red); }
    .cart-item-total { font-weight: 800; font-size: 1rem; flex-shrink: 0; }
    .order-box { background: var(--cream); border: 1px solid var(--g200); border-radius: var(--rad); border-top: 3px solid var(--teal); padding: 1.25rem; position: sticky; top: 5rem; }
    .order-row { display: flex; justify-content: space-between; font-size: .9375rem; padding: .2rem 0; }
    .order-row.discount { color: var(--teal-light); }
    .order-row.total { font-weight: 800; font-size: 1.125rem; border-top: 1px solid var(--g200); padding-top: .625rem; margin-top: .375rem; }

    /* ── Form fields ── */
    .fld {
      width: 100%; padding: .65rem .875rem;
      border: 1.5px solid var(--g200); border-radius: var(--rad);
      font-size: .9375rem; transition: border-color .15s; background: #fff;
    }
    .fld:focus { outline: none; border-color: var(--teal-light); box-shadow: 0 0 0 3px rgba(40,130,200,.1); }
    .fld-label { font-size: .775rem; font-weight: 700; text-transform: uppercase; color: var(--g500); letter-spacing: .04em; margin-bottom: .35rem; display: block; }
    .fld-g { margin-bottom: .875rem; }
    .fld-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    @media (max-width: 500px) { .fld-row { grid-template-columns: 1fr; } }

    /* ── Checkout ── */
    .co-steps { display: flex; align-items: center; gap: .5rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .co-step { display: flex; align-items: center; gap: .375rem; font-size: .8125rem; font-weight: 700; color: var(--g400); }
    .co-step.active { color: var(--teal); }
    .co-step.done { color: var(--teal-light); }
    .co-step-n { width: 1.625rem; height: 1.625rem; border-radius: 50%; border: 2px solid currentColor; display: flex; align-items: center; justify-content: center; font-size: .75rem; flex-shrink: 0; }
    .co-sep { flex: 1; height: 2px; background: var(--g200); min-width: 1rem; }
    .co-card { background: #fff; border-radius: var(--rad); border: 1px solid var(--g200); border-top: 3px solid var(--g200); padding: 1.5rem; margin-bottom: 1.25rem; }
    .co-card h2 { font-size: 1.0625rem; font-weight: 800; margin-bottom: 1.25rem; }
    .ship-opt {
      display: flex; align-items: center; gap: .75rem; padding: .875rem;
      border: 2px solid var(--g200); border-radius: var(--rad);
      cursor: pointer; transition: border-color .15s, background .15s; margin-bottom: .5rem;
    }
    .ship-opt:has(input:checked) { border-color: var(--teal); background: var(--g100); }
    .ship-opt input { accent-color: var(--teal); flex-shrink: 0; }
    .ship-opt-name { font-weight: 700; font-size: .9375rem; }
    .ship-opt-days { font-size: .8125rem; color: var(--g500); }
    .ship-opt-price { margin-left: auto; font-weight: 800; color: var(--teal); flex-shrink: 0; }
    #stripe-element { padding: .75rem; border: 1.5px solid var(--g200); border-radius: var(--rad); background: #fff; min-height: 44px; }

    /* ── Account / Auth ── */
    .auth-card { background: #fff; border-radius: var(--rad); border: 1px solid var(--g200); border-top: 3px solid var(--teal); padding: 2rem; max-width: 400px; margin: 2rem auto; }
    .auth-tabs { display: flex; border-bottom: 2px solid var(--g200); margin-bottom: 1.5rem; }
    .auth-tab { padding: .625rem 1rem; font-weight: 700; font-size: .9375rem; color: var(--g500); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color .15s, border-color .15s; }
    .auth-tab.active { color: var(--teal); border-bottom-color: var(--teal); }
    .order-card { background: #fff; border-radius: var(--rad); border: 1px solid var(--g200); padding: 1rem; margin-bottom: .75rem; }
    .order-card-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: .375rem; }
    .order-num { font-weight: 800; font-size: .9375rem; }
    .status-badge { padding: .2rem .625rem; border-radius: 999px; font-size: .75rem; font-weight: 800; text-transform: uppercase; }
    .s-pending   { background: #fef3c7; color: #92400e; }
    .s-paid      { background: #d1fae5; color: #065f46; }
    .s-fulfilled { background: #dbeafe; color: #1d4ed8; }
    .s-cancelled { background: #fee2e2; color: #991b1b; }

    /* ── Trust bar (cream — warm accent band) ── */
    .trust-bar { background: var(--cream); border-top: 3px solid var(--teal); border-bottom: 3px solid var(--teal-light); padding: 2.5rem 0; }
    .trust-items { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; text-align: center; }
    .trust-icon { font-size: 2rem; margin-bottom: .5rem; }
    .trust-title { font-weight: 800; margin-bottom: .25rem; }
    .trust-sub { font-size: .875rem; color: var(--g500); }

    /* ── Toast ── */
    #toast-area { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; pointer-events: none; }
    .toast { background: var(--g900); color: #fff; padding: .75rem 1.25rem; border-radius: var(--rad); font-size: .875rem; font-weight: 600; box-shadow: var(--sh-md); margin-top: .5rem; animation: slideIn .2s ease; }
    .toast.err { background: var(--red); }
    @keyframes slideIn { from { opacity: 0; transform: translateY(.5rem); } to { opacity: 1; transform: translateY(0); } }

    /* ── Loading ── */
    .ld { text-align: center; padding: 4rem 1rem; color: var(--g500); }
    .spin { width: 2rem; height: 2rem; border: 3px solid var(--g200); border-top-color: var(--teal); border-radius: 50%; animation: rot .65s linear infinite; margin: 0 auto .875rem; }
    @keyframes rot { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    #ftr { background: var(--teal); border-top: 4px solid var(--teal-light); color: rgba(255,255,255,.65); text-align: center; padding: 2rem 1rem; font-size: .875rem; margin-top: 3rem; }
    #ftr a { color: rgba(255,255,255,.75); }

    /* ── Shop layout (sidebar + main) ── */
    .shop-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 1.75rem;
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 3rem;
      align-items: start;
    }
    /* Shop section title — blue left accent */
    .shop-hd {
      display: flex; align-items: baseline; justify-content: space-between;
      flex-wrap: wrap; gap: .375rem; margin-bottom: 1rem;
    }
    .shop-hd h1 {
      font-size: 1.25rem; font-weight: 800; color: var(--g900); margin: 0;
      border-left: 4px solid var(--teal-light); padding-left: .625rem;
    }
    .shop-hd-count { font-size: .8125rem; color: var(--g500); }

    /* ── Sidebar (cream bg, green left edge) ── */
    .sidebar {
      background: var(--cream);
      border: 1px solid var(--g200);
      border-left: 4px solid var(--teal);
      border-radius: var(--rad);
      padding: 1rem; position: sticky; top: 5.25rem;
      max-height: calc(100vh - 6rem); overflow-y: auto;
    }
    .sidebar-hd {
      font-size: .6875rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .08em; color: var(--teal); margin-bottom: .625rem;
      padding-bottom: .5rem; border-bottom: 1px solid var(--g200);
    }
    .sidebar-link {
      display: block; padding: .4375rem .625rem; border-radius: var(--rad);
      font-size: .875rem; font-weight: 600; color: var(--g700);
      transition: background .12s, color .12s;
    }
    .sidebar-link:hover { background: rgba(26,87,40,.06); color: var(--teal); }
    .sidebar-link.active { color: var(--teal); background: rgba(26,87,40,.09); font-weight: 700; }
    .sidebar-sub {
      display: block; padding: .3125rem .625rem .3125rem 1.25rem;
      border-radius: var(--rad); font-size: .8125rem; font-weight: 500; color: var(--g500);
      transition: background .12s, color .12s;
    }
    .sidebar-sub:hover { background: rgba(26,87,40,.06); color: var(--g700); }
    .sidebar-sub.active { color: var(--teal); font-weight: 700; }

    /* ── Mobile category strip ── */
    .mobile-cats {
      display: none; overflow-x: auto; scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding: .625rem 1.25rem; gap: .5rem;
      background: var(--cream); border-bottom: 3px solid var(--teal);
    }
    .mobile-cats::-webkit-scrollbar { display: none; }
    .mobile-cat-pill {
      display: inline-block; flex-shrink: 0; white-space: nowrap;
      padding: .375rem .875rem; border-radius: 2rem;
      border: 1.5px solid var(--g200); background: #fff;
      font-size: .8125rem; font-weight: 600; color: var(--g700);
      transition: all .15s;
    }
    .mobile-cat-pill:hover, .mobile-cat-pill.active {
      background: var(--teal); border-color: var(--teal); color: #fff;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .shop-layout { grid-template-columns: 1fr; padding: 1rem 1rem 2.5rem; gap: 1rem; }
      .sidebar { display: none; }
      .mobile-cats { display: flex; }
    }
    @media (max-width: 640px) {
      .hdr-links { display: none; }
      .cat-grid  { grid-template-columns: repeat(3, 1fr); gap: .75rem; }
      .prod-grid { grid-template-columns: repeat(2, 1fr); gap: .75rem; }
    }
  </style>
</head>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
// Replace with your actual values before deploying
const SUPABASE_URL  = 'https://wxrifqyqhgkllslprtai.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4cmlmcXlxaGdrbGxzbHBydGFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNzUxMzMsImV4cCI6MjA4NzY1MTEzM30.Rnfg9eIQkvnyHMMyYn1GS1LYuZFJ32mxR1qWieS4RkA';
const STRIPE_PK     = 'pk_live_51T5LDiCDu3b9bXYMyphr5R9EZf1MQjaIgBSVzVGCP5ruZTlFRvSJWTxM5AqR7Qd0cH8eVycTISGzbV5xTwaeeBcG00WNstjNoL';
const FN = '/.netlify/functions';

// ─── SUPABASE ─────────────────────────────────────────────────────────────────
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
  auth: { persistSession: true, autoRefreshToken: true }
});

// ─── STATE ────────────────────────────────────────────────────────────────────
let _user         = null;
let _isSub        = false;
let _cart         = JSON.parse(localStorage.getItem('pcp_cart') || '[]');
let _allCats      = null;
let _stripe       = null;
let _stripeEls    = null;
let _coInfo       = null;
let _rates        = [];
let _selRate      = null;
let _coOrder      = null;
let _coStep       = 1;
let _authMode     = 'login';

// ─── CART HELPERS ─────────────────────────────────────────────────────────────
function saveCart() {
  localStorage.setItem('pcp_cart', JSON.stringify(_cart));
  renderCartBadge();
}
function renderCartBadge() {
  const n = _cart.reduce((s, i) => s + i.qty, 0);
  document.getElementById('cartBadge').textContent = n;
}
function cartSubtotal() { return _cart.reduce((s, i) => s + i.price * i.qty, 0); }
function cartDiscount() { return _cart.reduce((s, i) => s + (i.ss ? (i.origPrice - i.price) * i.qty : 0), 0); }
function cartHasFreight() { return _cart.some(i => i.is_freight); }
function freeShipEligible() { return !cartHasFreight() && cartSubtotal() >= 99; }

// ─── TOAST ────────────────────────────────────────────────────────────────────
function toast(msg, ok = true) {
  const c = document.getElementById('toast-area');
  const el = document.createElement('div');
  el.className = 'toast' + (ok ? '' : ' err');
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function nav(path, replace = false) {
  if (replace) history.replaceState({}, '', path);
  else         history.pushState({}, '', path);
  route();
}

document.addEventListener('click', e => {
  const a = e.target.closest('[data-nav]');
  if (a) { e.preventDefault(); nav(a.dataset.nav); }
});

window.addEventListener('popstate', route);

document.getElementById('cartBtn').addEventListener('click', () => nav('/cart'));

function route() {
  const p = location.pathname;
  const root = document.getElementById('root');
  root.innerHTML = '<div class="ld"><div class="spin"></div><p>Loading…</p></div>';
  renderCartBadge();

  if (p === '/' || p === '')          return pgHome(root);
  if (p === '/collections')           return pgCollections(root);
  if (p.startsWith('/collections/'))  return pgCollection(root, p.replace('/collections/', '').replace(/\/$/, ''));
  if (p === '/brands')                return pgBrands(root);
  if (p.startsWith('/brands/'))       return pgBrand(root, decodeURIComponent(p.replace('/brands/', '').replace(/\/$/, '')));
  if (p.startsWith('/products/'))     return pgProduct(root, p.replace('/products/', '').replace(/\/$/, ''));
  if (p === '/cart')                  return pgCart(root);
  if (p === '/checkout')              return pgCheckout(root);
  if (p === '/account')               return pgAccount(root);
  if (p === '/order-confirm')         return pgOrderConfirm(root);
  root.innerHTML = `<div class="wrap sec"><h1 style="font-size:2rem;font-weight:900">404</h1><p style="color:var(--g500);margin-top:.5rem">Page not found. <a href="/" data-nav="/" style="color:var(--teal)">← Home</a></p></div>`;
}

// ─── META ─────────────────────────────────────────────────────────────────────
function setMeta(title, desc) {
  document.title = title;
  let m = document.querySelector('meta[name="description"]');
  if (!m) { m = document.createElement('meta'); m.name = 'description'; document.head.appendChild(m); }
  m.content = desc || '';
}

// ─── JSON-LD ──────────────────────────────────────────────────────────────────
function ldInject(obj) {
  let el = document.getElementById('ld');
  if (!el) { el = document.createElement('script'); el.id = 'ld'; el.type = 'application/ld+json'; document.head.appendChild(el); }
  el.textContent = JSON.stringify(obj);
}
function ldWebsite() {
  ldInject({ '@context': 'https://schema.org', '@type': 'WebSite', name: 'Pacific Coast Ponds Shop', url: location.origin });
}
function ldProduct(p) {
  ldInject({
    '@context': 'https://schema.org', '@type': 'Product',
    name: p.name,
    description: p.shop_description || p.description || '',
    image: p.image_url || undefined,
    sku: p.sku || undefined,
    brand: p.brand ? { '@type': 'Brand', name: p.brand } : undefined,
    offers: {
      '@type': 'Offer', priceCurrency: 'USD',
      price: parseFloat(p.price).toFixed(2),
      availability: p.stock_status === 'in_stock'
        ? 'https://schema.org/InStock' : 'https://schema.org/OutOfStock',
      url: location.href,
      seller: { '@type': 'Organization', name: 'Pacific Coast Ponds' }
    }
  });
}
function ldBreadcrumb(items) {
  ldInject({
    '@context': 'https://schema.org', '@type': 'BreadcrumbList',
    itemListElement: items.map((it, i) => ({
      '@type': 'ListItem', position: i + 1, name: it.name,
      item: location.origin + it.url
    }))
  });
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}
function catIcon(name) {
  const map = [
    ['Aerat','💨'], ['Filter','🔵'], ['UV','☀️'], ['Clean','🧹'],
    ['Chem','🧪'], ['Pump','⚙️'], ['Fish','🐟'], ['Plumb','🔧'],
    ['Handl','🪣'], ['Predator','🦅'], ['Construct','🏗'],
    ['Water Feature','⛲'], ['Waterfall','💧'], ['Fountain','⛲'],
    ['Liner','🪨'], ['Pond','🌊'],
  ];
  for (const [k, icon] of map) {
    if (name.toLowerCase().includes(k.toLowerCase())) return icon;
  }
  return '📦';
}
const US_STATES = ['AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA','KS','KY','LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY'];

// ─── CATEGORY HELPERS ─────────────────────────────────────────────────────────
async function getCategories() {
  if (_allCats) return _allCats;
  const { data } = await sb.from('product_categories').select('id, name, slug, parent_id').order('name');
  _allCats = data || [];
  return _allCats;
}

// ─── BRAND HELPERS ───────────────────────────────────────────────────────────
let _allBrands = null;  // [{name, logo_url}]
async function getBrands() {
  if (_allBrands) return _allBrands;
  const { data } = await sb.from('brands').select('name, logo_url').order('name');
  _allBrands = data || [];
  return _allBrands;
}
function brandSlug(name) { return encodeURIComponent(name.toLowerCase().replace(/\s+/g, '-')); }
function brandFromSlug(slug) {
  if (!_allBrands) return slug;
  const b = _allBrands.find(b => brandSlug(b.name) === slug);
  return b ? b.name : slug;
}
function brandLogo(name) {
  if (!_allBrands) return null;
  const b = _allBrands.find(b => b.name === name);
  return b?.logo_url || null;
}

function buildSidebar(cats, activeCatId, activeBrand) {
  const parents  = cats.filter(c => !c.parent_id);
  const children = cats.filter(c => c.parent_id);
  let html = '<aside class="sidebar"><p class="sidebar-hd">Categories</p>';
  html += '<a href="/collections" data-nav="/collections" class="sidebar-link' + (!activeCatId && !activeBrand ? ' active' : '') + '">All Products</a>';
  parents.forEach(p => {
    const kids           = children.filter(c => c.parent_id === p.id);
    const isActive       = p.id === activeCatId;
    const hasActiveChild = kids.some(k => k.id === activeCatId);
    html += '<a href="/collections/' + esc(p.slug||p.id) + '" data-nav="/collections/' + esc(p.slug||p.id) + '" class="sidebar-link' + (isActive ? ' active' : '') + '">' + esc(p.name) + '</a>';
    if (isActive || hasActiveChild) {
      kids.forEach(k => {
        html += '<a href="/collections/' + esc(k.slug||k.id) + '" data-nav="/collections/' + esc(k.slug||k.id) + '" class="sidebar-sub' + (k.id === activeCatId ? ' active' : '') + '">' + esc(k.name) + '</a>';
      });
    }
  });
  // Brands section
  if (_allBrands && _allBrands.length) {
    html += '<p class="sidebar-hd" style="margin-top:1rem;">Brands</p>';
    html += '<a href="/brands" data-nav="/brands" class="sidebar-link' + (activeBrand === '__all' ? ' active' : '') + '">All Brands</a>';
    _allBrands.forEach(b => {
      html += '<a href="/brands/' + brandSlug(b.name) + '" data-nav="/brands/' + brandSlug(b.name) + '" class="sidebar-link' + (activeBrand === b.name ? ' active' : '') + '">' + esc(b.name) + '</a>';
    });
  }
  html += '</aside>';
  return html;
}

function buildMobileCats(cats, activeCatId) {
  const parents = cats.filter(c => !c.parent_id);
  return '<div class="mobile-cats">' +
    '<a href="/collections" data-nav="/collections" class="mobile-cat-pill' + (!activeCatId ? ' active' : '') + '">All</a>' +
    parents.map(p =>
      '<a href="/collections/' + esc(p.slug||p.id) + '" data-nav="/collections/' + esc(p.slug||p.id) + '" class="mobile-cat-pill' + (p.id === activeCatId ? ' active' : '') + '">' + esc(p.name) + '</a>'
    ).join('') +
    '</div>';
}

// ─── BRAND PILLS ─────────────────────────────────────────────────────────────
function buildBrandPills(products, wrapId) {
  const brands = [...new Set((products||[]).map(p => p.brand).filter(Boolean))].sort();
  if (brands.length < 2) return;
  const wrap = document.getElementById(wrapId);
  if (!wrap) return;
  wrap.innerHTML = '<div class="brand-pills">' +
    '<button class="brand-pill active" data-brand="">All Brands</button>' +
    brands.map(b => '<button class="brand-pill" data-brand="' + esc(b) + '">' + esc(b) + '</button>').join('') +
    '</div>';
  wrap.addEventListener('click', e => {
    const pill = e.target.closest('.brand-pill');
    if (!pill) return;
    wrap.querySelectorAll('.brand-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    const brand = pill.dataset.brand;
    document.querySelectorAll('.prod-grid .prod-card').forEach(card => {
      card.style.display = (!brand || card.dataset.brand === brand) ? '' : 'none';
    });
    const visible = document.querySelectorAll('.prod-grid .prod-card').length -
      document.querySelectorAll('.prod-grid .prod-card[style*="display: none"]').length;
    const countEl = document.querySelector('.shop-hd-count');
    if (countEl) countEl.textContent = visible + ' products';
  });
}

// ─── PRODUCT CARD ─────────────────────────────────────────────────────────────
function prodCard(p) {
  const inStock = p.stock_status !== 'out_of_stock' && p.stock_status !== 'discontinued';
  const ssPrice = (p.subscribe_save_eligible && _isSub) ? +(p.price * 0.95).toFixed(2) : null;
  const url = `/products/${esc(p.slug || p.id)}`;
  return `
    <article class="prod-card" data-nav="${url}" data-brand="${esc(p.brand||'')}" style="cursor:pointer">
      <div class="prod-img">
        ${p.image_url
          ? `<img src="${esc(p.image_url)}" alt="${esc(p.name)}" loading="lazy">`
          : `<div class="prod-img-ph">📦</div>`}
      </div>
      <div class="prod-body">
        ${p.brand ? `<p class="prod-brand">${esc(p.brand)}</p>` : ''}
        <p class="prod-name">${esc(p.name)}</p>
        <div class="prod-foot">
          <div>
            <p class="prod-price ${ssPrice ? 'prod-price-ss' : ''}">
              $${ssPrice ? ssPrice.toFixed(2) : parseFloat(p.price).toFixed(2)}
            </p>
            ${p.subscribe_save_eligible ? '<span class="badge-ss">S&S</span>' : ''}
            ${p.is_freight ? '<span class="badge-freight">Freight</span>' : ''}
            ${!inStock ? '<span class="badge-oos">Out of Stock</span>' : ''}
          </div>
          <button class="atc-sm js-atc"
            data-id="${esc(p.id)}" data-name="${esc(p.name)}"
            data-price="${p.price}" data-img="${esc(p.image_url || '')}"
            data-ss="${p.subscribe_save_eligible}"
            data-freight="${p.is_freight||false}"
            data-has-variants="${p.variant_attribute ? 'true' : 'false'}"
            data-slug="${esc(p.slug || p.id)}"
            ${inStock ? '' : 'disabled'}
            title="${p.variant_attribute ? 'Select options' : (inStock ? 'Add to cart' : 'Out of stock')}"
          >${p.variant_attribute ? '→' : '+'}</button>
        </div>
      </div>
    </article>`;
}

// Use event delegation for add-to-cart buttons
document.addEventListener('click', e => {
  const btn = e.target.closest('.js-atc');
  if (!btn) return;
  e.stopPropagation();
  // Variant products: navigate to product page for size selection
  if (btn.dataset.hasVariants === 'true') {
    nav('/products/' + btn.dataset.slug);
    return;
  }
  const ssEligible = btn.dataset.ss === 'true';
  const origPrice  = parseFloat(btn.dataset.price);
  const price      = (ssEligible && _isSub) ? +(origPrice * 0.95).toFixed(2) : origPrice;
  const name       = btn.dataset.name;
  const isFreight  = btn.dataset.freight === 'true';
  const existing   = _cart.find(i => i.product_id === btn.dataset.id);
  if (existing) existing.qty++;
  else _cart.push({ product_id: btn.dataset.id, name, price, origPrice, image_url: btn.dataset.img, qty: 1, ss: ssEligible && _isSub, is_freight: isFreight });
  saveCart();
  toast(name + ' added to cart');
});

// ─── HOME ─────────────────────────────────────────────────────────────────────
async function pgHome(el) {
  setMeta('Pacific Coast Ponds Shop — Pond Supplies & Equipment',
    'Professional pond supplies shipped direct. Pumps, filters, aeration, treatments & more.');
  ldWebsite();

  const [cats, brands, { data: featured }] = await Promise.all([
    getCategories(),
    getBrands(),
    sb.from('products')
      .select('id, name, slug, price, image_url, brand, stock_status, subscribe_save_eligible, variant_attribute, is_freight')
      .eq('active', true).eq('shop_visible', true).not('slug', 'is', null)
      .order('created_at', { ascending: false }).limit(12),
  ]);

  const sidebar      = buildSidebar(cats, null);
  const mobileCats   = buildMobileCats(cats, null);
  const productsHtml = featured?.length
    ? '<div class="prod-grid">' + featured.map(prodCard).join('') + '</div>'
    : '<p style="color:var(--g500)">No products found.</p>';

  el.innerHTML =
    '<section class="hero"><div class="hero-inner">' +
      '<h1>Your Pond, Perfectly Equipped</h1>' +
      '<p>Professional-grade pond supplies — pumps, filters, UV, aeration &amp; more.</p>' +
      '<a href="/collections" data-nav="/collections" class="btn-primary">Browse All Products</a>' +
    '</div></section>' +
    mobileCats +
    '<div class="shop-layout">' +
      sidebar +
      '<div class="shop-main">' +
        '<div class="shop-hd"><h1>New Arrivals</h1><span class="shop-hd-count">' + (featured?.length || 0) + ' products</span></div>' +
        productsHtml +
      '</div>' +
    '</div>';
}

// ─── COLLECTIONS ──────────────────────────────────────────────────────────────
async function pgCollections(el) {
  setMeta('All Products — Pacific Coast Ponds Shop', 'Shop all professional pond supplies.');
  ldBreadcrumb([{ name: 'Home', url: '/' }, { name: 'Shop', url: '/collections' }]);

  const [cats, brands, { data: products }] = await Promise.all([
    getCategories(),
    getBrands(),
    sb.from('products')
      .select('id, name, slug, price, image_url, brand, stock_status, subscribe_save_eligible, variant_attribute, is_freight')
      .eq('active', true).eq('shop_visible', true).order('name'),
  ]);

const _UUID_RE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
async function pgCollection(el, slug) {
  const col = _UUID_RE.test(slug) ? 'id' : 'slug';
  const { data: cat } = await sb.from('product_categories')
    .select('id, name, slug, parent_id')
    .eq(col, slug).maybeSingle();
  if (!cat) { el.innerHTML = '<div class="wrap sec"><p>Category not found.</p></div>'; return; }

  setMeta(`${cat.name} — Pacific Coast Ponds Shop`, `Shop ${cat.name} pond supplies at Pacific Coast Ponds.`);

  // Fetch subcategories (with names for pill display)
  const { data: subs } = await sb.from('product_categories')
    .select('id, name, slug').eq('parent_id', cat.id).order('name');
  const ids = [cat.id, ...(subs || []).map(s => s.id)];

  // If we're on a subcategory page, fetch parent + sibling subcats for the filter strip
  let parentCat = null, sibSubs = [];
  if (cat.parent_id) {
    const [{ data: par }, { data: sibs }] = await Promise.all([
      sb.from('product_categories').select('id, name, slug').eq('id', cat.parent_id).maybeSingle(),
      sb.from('product_categories').select('id, name, slug').eq('parent_id', cat.parent_id).order('name'),
    ]);
    parentCat = par;
    sibSubs = sibs || [];
  }

  const { data: products } = await sb.from('products')
    .select('id, name, slug, price, image_url, brand, stock_status, subscribe_save_eligible, variant_attribute, is_freight')
    .in('category_id', ids).eq('active', true).eq('shop_visible', true).order('name');

  ldBreadcrumb([
    { name: 'Home', url: '/' },
    { name: 'Shop', url: '/collections' },
    ...(parentCat ? [{ name: parentCat.name, url: `/collections/${parentCat.slug||parentCat.id}` }] : []),
    { name: cat.name, url: `/collections/${slug}` },
  ]);

  // Pill list: show child subcats when on a parent, or sibling subcats when on a child
  const pillList = subs?.length ? subs : sibSubs;
  const pillsHtml = pillList.length ? `
    <div class="sub-pills">
      ${sibSubs.length && parentCat ? `<a href="/collections/${esc(parentCat.slug||parentCat.id)}" data-nav="/collections/${esc(parentCat.slug||parentCat.id)}" class="sub-pill">All</a>` : ''}
      ${pillList.map(s => `<a href="/collections/${esc(s.slug||s.id)}" data-nav="/collections/${esc(s.slug||s.id)}" class="sub-pill${s.id===cat.id?' active':''}">${esc(s.name)}</a>`).join('')}
    </div>` : '';

  const [allCats] = await Promise.all([getCategories(), getBrands()]);
  const sidebar    = buildSidebar(allCats, cat.id);
  const mobileCats = buildMobileCats(allCats, cat.parent_id || cat.id);

  const bcHtml = '<nav class="bc">' +
    '<a href="/" data-nav="/">Home</a><span>›</span>' +
    '<a href="/collections" data-nav="/collections">Shop</a><span>›</span>' +
    (parentCat ? '<a href="/collections/' + esc(parentCat.slug||parentCat.id) + '" data-nav="/collections/' + esc(parentCat.slug||parentCat.id) + '">' + esc(parentCat.name) + '</a><span>›</span>' : '') +
    '<span>' + esc(cat.name) + '</span></nav>';

  const productsHtml = !products?.length
    ? '<p style="color:var(--g500)">No products in this category yet.</p>'
    : '<div class="prod-grid">' + products.map(prodCard).join('') + '</div>';

  el.innerHTML =
    mobileCats +
    '<div class="shop-layout">' +
      sidebar +
      '<div class="shop-main">' +
        bcHtml +
        '<div class="shop-hd"><h1>' + esc(cat.name) + '</h1><span class="shop-hd-count">' + (products?.length || 0) + ' products</span></div>' +
        pillsHtml +
        '<div id="brandPillsWrap"></div>' +
        productsHtml +

}

// ─── PRODUCT ──────────────────────────────────────────────────────────────────
async function pgProduct(el, slug) {
  const col = _UUID_RE.test(slug) ? 'id' : 'slug';
  const { data: p } = await sb.from('products')
    .select('id, name, slug, sku, price, image_url, brand, stock_status, subscribe_save_eligible, shop_description, description, meta_title, meta_description, weight_oz, category_id, variant_attribute, is_freight')
    .eq(col, slug)
    .eq('active', true).eq('shop_visible', true).maybeSingle();
  if (!p) { el.innerHTML = '<div class="wrap sec"><p>Product not found.</p></div>'; return; }

  // Fetch variants if product has a variant attribute
  let variants = [];
  if (p.variant_attribute) {
    const { data: vData } = await sb.from('product_variants')
      .select('id, value, sku, price, stock_status, weight_oz, image_url, sort_order')
      .eq('product_id', p.id).eq('active', true)
      .order('sort_order').order('value');
    variants = vData || [];
  }

  let cat = null;
  if (p.category_id) {
    const { data: c } = await sb.from('product_categories').select('id, name, slug').eq('id', p.category_id).maybeSingle();
    cat = c;
  }

  setMeta(p.meta_title || `${p.name} — Pacific Coast Ponds Shop`,
    p.meta_description || (p.shop_description || p.description || '').slice(0, 160));
  ldProduct(p);
  if (cat) ldBreadcrumb([
    { name: 'Home', url: '/' },
    { name: 'Shop', url: '/collections' },
    { name: cat.name, url: `/collections/${cat.slug || cat.id}` },
    { name: p.name, url: `/products/${p.slug}` },
  ]);

  // State for selected variant
  let _selVariant = variants.length === 1 ? variants[0] : null;

  const hasVariants = variants.length > 0;

  function getEffectivePrice(variant) {
    const base = variant ? parseFloat(variant.price) : parseFloat(p.price);
    const eligible = p.subscribe_save_eligible && _isSub;
    return eligible ? +(base * 0.95).toFixed(2) : base;
  }
  function getOrigPrice(variant) {
    return variant ? parseFloat(variant.price) : parseFloat(p.price);
  }
  function isInStock(variant) {
    const s = variant ? variant.stock_status : p.stock_status;
    return s !== 'out_of_stock' && s !== 'discontinued';
  }

  function renderPriceHtml(variant) {
    const price    = getEffectivePrice(variant);
    const origPrice = getOrigPrice(variant);
    const ssApplied = p.subscribe_save_eligible && _isSub;
    if (ssApplied) {
      return `<span class="pd-price-ss">$${price.toFixed(2)}</span>
              <span class="pd-price-orig">$${origPrice.toFixed(2)}</span>`;
    }
    return `<span class="pd-price">$${price.toFixed(2)}</span>`;
  }

  function renderAtcHtml(variant) {
    if (hasVariants && !variant) {
      return `<button class="btn-atc" disabled>Select a ${esc(p.variant_attribute)}</button>`;
    }
    if (!isInStock(variant)) {
      return `<p class="badge-oos" style="font-size:.9375rem;padding:.5rem 1rem;border-radius:var(--rad);display:inline-block;margin-bottom:1rem;">Out of Stock</p>`;
    }
    return `
      <div class="qty-row">
        <span class="qty-label">Qty</span>
        <div class="qty-ctrl">
          <button type="button" id="qtyMinus">−</button>
          <input type="number" id="qtyInput" value="1" min="1" max="99">
          <button type="button" id="qtyPlus">+</button>
        </div>
      </div>
      <button class="btn-atc" id="atcBtn">Add to Cart</button>`;
  }

  function renderMetaHtml(variant) {
    const sku = variant?.sku || p.sku;
    const wt  = variant?.weight_oz || p.weight_oz;
    const stock = isInStock(variant);
    return `
      ${stock ? '<span>✓ In Stock</span>' : ''}
      ${wt  ? `<span>Weight: ${wt} oz</span>` : ''}
      ${sku ? `<span>SKU: ${esc(sku)}</span>` : ''}`;
  }

  const displayDesc = p.shop_description || p.description || '';
  const productImg  = p.image_url ? `<img src="${esc(p.image_url)}" alt="${esc(p.name)}" id="pdMainImg">` : `<div class="pd-img-ph">📦</div>`;

  el.innerHTML = `
    <div class="wrap sec">
      <nav class="bc">
        <a href="/" data-nav="/">Home</a><span>›</span>
        ${cat ? `<a href="/collections/${cat.slug || cat.id}" data-nav="/collections/${cat.slug || cat.id}">${esc(cat.name)}</a><span>›</span>` : ''}
        <span>${esc(p.name)}</span>
      </nav>
      <div class="pd-grid">
        <div class="pd-img" id="pdImgWrap">
          ${productImg}
        </div>
        <div>
          ${p.brand ? `<p class="pd-brand">${esc(p.brand)}</p>` : ''}
          <h1 class="pd-title">${esc(p.name)}</h1>
          <div class="pd-price-row" id="pdPriceRow">
            ${renderPriceHtml(_selVariant)}
          </div>
          ${p.subscribe_save_eligible ? `
            <div class="ss-banner">
              💚 ${_isSub
                ? `Subscribe &amp; Save applied — save 5%`
                : `Save 5% with Subscribe &amp; Save. <a href="/account" data-nav="/account" style="color:var(--green);text-decoration:underline;margin-left:.25rem">Join free →</a>`}
            </div>` : ''}
          ${hasVariants ? `
            <div class="var-group">
              <p class="var-label">${esc(p.variant_attribute)}:</p>
              <div class="var-pills" id="varPills">
                ${variants.map(v => `
                  <button class="var-pill${v.stock_status!=='in_stock'?' oos':''}${_selVariant?.id===v.id?' selected':''}"
                    data-vid="${esc(v.id)}"
                    ${v.stock_status!=='in_stock'?'disabled':''}>
                    ${esc(v.value)}
                  </button>`).join('')}
              </div>
            </div>` : ''}
          ${displayDesc ? `<div class="pd-desc">${displayDesc}</div>` : ''}
          <div id="pdAtcWrap">${renderAtcHtml(_selVariant)}</div>
          <div class="pd-meta" id="pdMeta">${renderMetaHtml(_selVariant)}</div>
        </div>
      </div>
    </div>`;

  function bindAtcHandlers() {
    const minus = document.getElementById('qtyMinus');
    const plus  = document.getElementById('qtyPlus');
    const atcBtn = document.getElementById('atcBtn');
    if (minus) minus.addEventListener('click', () => {
      const inp = document.getElementById('qtyInput');
      inp.value = Math.max(1, parseInt(inp.value || 1) - 1);
    });
    if (plus) plus.addEventListener('click', () => {
      const inp = document.getElementById('qtyInput');
      inp.value = Math.min(99, parseInt(inp.value || 1) + 1);
    });
    if (atcBtn) atcBtn.addEventListener('click', () => {
      const qty      = parseInt(document.getElementById('qtyInput').value || 1);
      const price    = getEffectivePrice(_selVariant);
      const origPrice = getOrigPrice(_selVariant);
      const img      = (_selVariant?.image_url) || p.image_url || '';
      const varId    = _selVariant?.id   || null;
      const varName  = _selVariant?.value || null;
      const key      = p.id + '|' + (varId || '');
      const existing = _cart.find(i => (i.product_id + '|' + (i.variant_id || '')) === key);
      if (existing) existing.qty += qty;
      else _cart.push({ product_id: p.id, name: p.name, price, origPrice, image_url: img, qty,
        ss: p.subscribe_save_eligible && _isSub, variant_id: varId, variant_name: varName, is_freight: !!p.is_freight });
      saveCart();
      toast(p.name + (varName ? ` (${varName})` : '') + ' added to cart');
    });
  }
  bindAtcHandlers();

  // Variant pill click handling
  if (hasVariants) {
    document.getElementById('varPills').addEventListener('click', e => {
      const pill = e.target.closest('.var-pill');
      if (!pill || pill.disabled) return;
      const vid = pill.dataset.vid;
      _selVariant = variants.find(v => v.id === vid) || null;

      // Update selected pill styling
      document.querySelectorAll('.var-pill').forEach(b => b.classList.remove('selected'));
      pill.classList.add('selected');

      // Update image if variant has one
      const imgWrap = document.getElementById('pdImgWrap');
      const varImg = _selVariant?.image_url || p.image_url;
      if (varImg) {
        imgWrap.innerHTML = `<img src="${esc(varImg)}" alt="${esc(p.name)}" id="pdMainImg">`;
      }

      // Update price, atc button, and meta
      document.getElementById('pdPriceRow').innerHTML = renderPriceHtml(_selVariant);
      document.getElementById('pdAtcWrap').innerHTML  = renderAtcHtml(_selVariant);
      document.getElementById('pdMeta').innerHTML     = renderMetaHtml(_selVariant);
      bindAtcHandlers();
    });
  }
}

            <strong>💚 Subscribe &amp; Save</strong> — <a href="/account" data-nav="/account" style="color:var(--green)">Join free</a> for 5% off eligible items
          </div>` : ''}

    const name  = document.getElementById('co_name').value.trim();
    const email = document.getElementById('co_email').value.trim();
    const addr1 = document.getElementById('co_addr1').value.trim();
    const city  = document.getElementById('co_city').value.trim();
    const state = document.getElementById('co_state').value;
    const zip   = document.getElementById('co_zip').value.trim();
    const addr2 = document.getElementById('co_addr2').value.trim();
    const phone = document.getElementById('co_phone').value.trim();

    if (!name || !email || !addr1 || !city || !state || !zip) {
      toast('Please fill in all required fields', false); return;
    }
    _coInfo = { name, email, address1: addr1, address2: addr2, city, state, zip, phone };

    const btn = document.getElementById('coBtn1');
    btn.textContent = 'Fetching rates…'; btn.disabled = true;

    // Free shipping or freight: skip rate lookup
    if (freeShipEligible()) {
      _rates = []; _selRate = { id: 'free', carrier: 'Free Shipping', service: 'Free Shipping', rate: '0.00', delivery_days: null };
      _coStep = 2; pgCheckout(document.getElementById('root')); return;
    }
    if (cartHasFreight()) {
      _rates = []; _selRate = { id: 'freight', carrier: 'Freight', service: 'Freight', rate: '0.00', delivery_days: null };
      _coStep = 2; pgCheckout(document.getElementById('root')); return;
    }

    try {
      const totalOz = _cart.reduce((s, i) => s + 16 * i.qty, 0);
      const res  = await fetch(`${FN}/shop-shipping`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          to_address: { name, street1: addr1, city, state, zip, phone },
          weight_oz: totalOz,
          has_freight: cartHasFreight(),
        }),
      });
      const data = await res.json();
      _rates   = data.rates || [];
      _selRate = _rates[0] || null;
      _coStep  = 2;
      pgCheckout(document.getElementById('root'));
    } catch {
      toast('Could not fetch shipping rates. Please try again.', false);
      btn.textContent = 'Continue to Shipping'; btn.disabled = false;
    }
  });
}

function renderCoShipping() {
  const el = document.getElementById('coContent');
  el.innerHTML = `
    <div class="co-card">
      <h2>Ship to</h2>
      <p style="font-size:.875rem;color:var(--g500);margin-bottom:1.25rem;">
        ${esc(_coInfo.address1)}${_coInfo.address2 ? ', ' + esc(_coInfo.address2) : ''},
        ${esc(_coInfo.city)}, ${esc(_coInfo.state)} ${esc(_coInfo.zip)}
        <button id="editAddrBtn" style="background:none;border:none;color:var(--teal);font-size:.8rem;font-weight:700;cursor:pointer;margin-left:.375rem;text-decoration:underline;">Edit</button>
      </p>
      <h3 style="font-weight:800;margin-bottom:.875rem;">Shipping</h3>
      ${_selRate?.id === 'free'
        ? '<div style="padding:1rem;background:#ecfdf5;border-radius:var(--rad);font-weight:700;color:#065f46;margin-bottom:.5rem;">Free shipping on orders over $99!</div>'
        : _selRate?.id === 'freight'
          ? '<div style="padding:1rem;background:#fef3c7;border-radius:var(--rad);color:#92400e;margin-bottom:.5rem;"><strong>Freight shipping required</strong><br>Your order contains oversized items. We\'ll contact you with a freight quote after placing your order.<br><br>Call us: <a href="tel:9495414903" style="color:#92400e;font-weight:700">(949) 541-4903</a></div>'
          : _rates.length
            ? _rates.map((r, i) => `
              <label class="ship-opt">
                <input type="radio" name="rate" value="${i}" ${i === 0 ? 'checked' : ''}>
                <div>
                  <p class="ship-opt-name">${esc(r.service)}</p>
                  <p class="ship-opt-days">${r.delivery_days ? r.delivery_days + ' business day' + (r.delivery_days !== 1 ? 's' : '') : 'Estimated delivery'}</p>
                </div>
                <span class="ship-opt-price">$${parseFloat(r.rate).toFixed(2)}</span>
              </label>`).join('')
            : '<p style="color:var(--g500)">No rates available.</p>'}
    </div>
    <button class="btn-primary" id="coBtn2" style="width:100%;padding:.875rem;text-align:center;">
      Continue to Payment
    </button>`;

  document.getElementById('editAddrBtn')?.addEventListener('click', () => { _coStep = 1; pgCheckout(document.getElementById('root')); });

  el.querySelectorAll('input[name="rate"]').forEach(inp => {
    inp.addEventListener('change', () => { _selRate = _rates[parseInt(inp.value)]; });
  });

  document.getElementById('coBtn2').addEventListener('click', () => {
    if (!_selRate && _rates.length) { toast('Please select a shipping option', false); return; }
    _coStep = 3;
    pgCheckout(document.getElementById('root'));
  });
}

async function renderCoPayment() {
  const el = document.getElementById('coContent');
  el.innerHTML = '<div class="ld"><div class="spin"></div><p>Preparing payment…</p></div>';

  let authToken = null;
  if (_user) {
    const { data: { session } } = await sb.auth.getSession();
    authToken = session?.access_token;
  }

  const res = await fetch(`${FN}/shop-checkout`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      items: _cart.map(i => ({
        product_id: i.product_id, product_name: i.name,
        quantity: i.qty, unit_price: i.price,
        variant_id: i.variant_id || null, variant_name: i.variant_name || null,
      })),
      shipping_address: {
        name: _coInfo.name, address1: _coInfo.address1, address2: _coInfo.address2,
        city: _coInfo.city, state: _coInfo.state, zip: _coInfo.zip, phone: _coInfo.phone,
      },
      shipping_rate: _selRate,
      customer_email: _coInfo.email,
      customer_name:  _coInfo.name,
      auth_token:     authToken,
    }),
  });
  const co = await res.json();

  if (co.error) {
    el.innerHTML = `<div class="co-card"><p style="color:var(--red);font-weight:600;">${esc(co.error)}</p></div>`;
    return;
  }
  _coOrder = co;

  el.innerHTML = `
    <div class="co-card">
      <h2>Order Summary</h2>
      <div class="order-row"><span>Subtotal</span><span>$${co.subtotal.toFixed(2)}</span></div>
      ${co.discount > 0 ? `<div class="order-row discount"><span>S&S Discount</span><span>−$${co.discount.toFixed(2)}</span></div>` : ''}
      <div class="order-row"><span>Shipping${_selRate?.id === 'freight' ? '' : ' (' + esc(_selRate?.service || '') + ')'}</span><span>${_selRate?.id === 'freight' ? 'TBD' : (co.shipping === 0 ? 'FREE' : '$' + co.shipping.toFixed(2))}</span></div>
      <div class="order-row total"><span>Total</span><span>$${co.total.toFixed(2)}</span></div>
    </div>
    <div class="co-card">
      <h2>Payment</h2>
      <div id="stripe-element"></div>
      <p id="stripe-err" style="color:var(--red);font-size:.875rem;margin-top:.5rem;display:none;"></p>
      <button class="btn-primary" id="payBtn" style="width:100%;padding:.875rem;margin-top:1.25rem;text-align:center;">
        Pay $${co.total.toFixed(2)}
      </button>
    </div>`;

  _stripe  = Stripe(STRIPE_PK);
  _stripeEls = _stripe.elements({
    clientSecret: co.client_secret,
    appearance: { theme: 'stripe', variables: { colorPrimary: '#1a7a6e', borderRadius: '8px' } },
  });
  const payEl = _stripeEls.create('payment');
  payEl.mount('#stripe-element');

  document.getElementById('payBtn').addEventListener('click', async () => {
    const btn  = document.getElementById('payBtn');
    const errEl = document.getElementById('stripe-err');
    btn.textContent = 'Processing…'; btn.disabled = true; errEl.style.display = 'none';

    const { error } = await _stripe.confirmPayment({
      elements: _stripeEls,
      confirmParams: {
        return_url: location.origin + '/order-confirm',
        receipt_email: _coInfo.email,
      },
    });

    if (error) {
      errEl.textContent = error.message; errEl.style.display = 'block';
      btn.textContent = `Pay $${co.total.toFixed(2)}`; btn.disabled = false;
    }
    // On success Stripe redirects to /order-confirm
  });
}

// ─── ORDER CONFIRM ────────────────────────────────────────────────────────────
async function pgOrderConfirm(el) {
  setMeta('Order Confirmed — Pacific Coast Ponds', '');
  const p      = new URLSearchParams(location.search);
  const piId   = p.get('payment_intent');
  const status = p.get('redirect_status');

  if (status === 'succeeded' && piId) {
    // Verify payment server-side, mark paid, trigger drop-ship emails
    await fetch(`${FN}/shop-order-paid`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ payment_intent_id: piId }),
    });
    _cart = []; saveCart();
  }

  el.innerHTML = `
    <div class="wrap-sm sec" style="text-align:center;padding-top:4rem;">
      ${status === 'succeeded' ? `
        <div style="font-size:4rem;margin-bottom:1rem;">✅</div>
        <h1 style="font-size:1.75rem;font-weight:900;margin-bottom:.5rem;">Order Confirmed!</h1>
        <p style="color:var(--g500);margin-bottom:2rem;">
          Thank you for your order. A confirmation email will be sent to
          <strong>${esc(_coInfo?.email || 'your email')}</strong>.
        </p>
        <a href="/" data-nav="/" class="btn-primary">Continue Shopping</a>
      ` : `
        <div style="font-size:4rem;margin-bottom:1rem;">❌</div>
        <h1 style="font-size:1.75rem;font-weight:900;margin-bottom:.5rem;">Payment Incomplete</h1>
        <p style="color:var(--g500);margin-bottom:2rem;">Your payment was not completed.</p>
        <a href="/checkout" data-nav="/checkout" class="btn-primary">Try Again</a>
      `}
    </div>`;
}

// ─── ACCOUNT ──────────────────────────────────────────────────────────────────
async function pgAccount(el) {
  setMeta('My Account — Pacific Coast Ponds Shop', '');
  if (_user) {
    renderAcctDash(el);
  } else {
    renderAcctAuth(el);
  }
}

function renderAcctAuth(el) {
  el.innerHTML = `
    <div class="wrap-sm sec">
      <div class="auth-card">
        <h1 style="font-size:1.25rem;font-weight:900;margin-bottom:1.25rem;">My Account</h1>
        <div class="auth-tabs">
          <div class="auth-tab ${_authMode==='login'?'active':''}" id="tabLogin">Sign In</div>
          <div class="auth-tab ${_authMode==='register'?'active':''}" id="tabRegister">Create Account</div>
        </div>
        <div id="authBody">
          ${_authMode === 'login' ? authLoginHtml() : authRegisterHtml()}
        </div>
      </div>
    </div>`;

  document.getElementById('tabLogin').addEventListener('click', () => { _authMode = 'login'; renderAcctAuth(document.getElementById('root')); });
  document.getElementById('tabRegister').addEventListener('click', () => { _authMode = 'register'; renderAcctAuth(document.getElementById('root')); });

  if (_authMode === 'login') {
    document.getElementById('authBtn').addEventListener('click', doLogin);
    document.getElementById('auth_pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  } else {
    document.getElementById('authBtn').addEventListener('click', doRegister);
  }
}

function authLoginHtml() {
  return `
    <div class="fld-g"><label class="fld-label">Email</label><input class="fld" id="auth_email" type="email" placeholder="you@example.com"></div>
    <div class="fld-g"><label class="fld-label">Password</label><input class="fld" id="auth_pass" type="password" placeholder="••••••••"></div>
    <p id="authErr" style="color:var(--red);font-size:.875rem;margin-bottom:.75rem;display:none;"></p>
    <button class="btn-primary" id="authBtn" style="width:100%;padding:.875rem;text-align:center;">Sign In</button>`;
}
function authRegisterHtml() {
  return `
    <div class="fld-g"><label class="fld-label">Full Name</label><input class="fld" id="auth_name" placeholder="Jane Smith"></div>
    <div class="fld-g"><label class="fld-label">Email</label><input class="fld" id="auth_email" type="email" placeholder="you@example.com"></div>
    <div class="fld-g"><label class="fld-label">Password</label><input class="fld" id="auth_pass" type="password" placeholder="Min 8 characters"></div>
    <p id="authErr" style="color:var(--red);font-size:.875rem;margin-bottom:.75rem;display:none;"></p>
    <button class="btn-primary" id="authBtn" style="width:100%;padding:.875rem;text-align:center;">Create Account</button>`;
}

async function doLogin() {
  const email = document.getElementById('auth_email')?.value.trim();
  const pass  = document.getElementById('auth_pass')?.value;
  const errEl = document.getElementById('authErr');
  const btn   = document.getElementById('authBtn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { errEl.textContent = error.message; errEl.style.display = 'block'; btn.disabled = false; btn.textContent = 'Sign In'; return; }
  _user = data.user; await checkSub();
  toast('Signed in!'); document.getElementById('acctLink').textContent = 'My Account';
  renderAcctDash(document.getElementById('root'));
}

async function doRegister() {
  const name  = document.getElementById('auth_name')?.value.trim();
  const email = document.getElementById('auth_email')?.value.trim();
  const pass  = document.getElementById('auth_pass')?.value;
  const errEl = document.getElementById('authErr');
  const btn   = document.getElementById('authBtn');
  btn.disabled = true; btn.textContent = 'Creating account…';
  const { data, error } = await sb.auth.signUp({ email, password: pass, options: { data: { full_name: name } } });
  if (error) { errEl.textContent = error.message; errEl.style.display = 'block'; btn.disabled = false; btn.textContent = 'Create Account'; return; }
  _user = data.user; await checkSub();
  toast('Account created! Check your email to confirm.');
  renderAcctDash(document.getElementById('root'));
}

async function renderAcctDash(el) {
  el.innerHTML = '<div class="ld"><div class="spin"></div><p>Loading…</p></div>';
  const { data: orders } = await sb.from('shop_orders')
    .select('id, order_number, total, status, created_at')
    .eq('customer_id', _user.id).order('created_at', { ascending: false });

  el.innerHTML = `
    <div class="wrap-sm sec">
      <h1 style="font-size:1.5rem;font-weight:900;margin-bottom:.375rem;">My Account</h1>
      <p style="color:var(--g500);font-size:.875rem;margin-bottom:2rem;">${esc(_user.email)}</p>

      <div class="co-card" style="margin-bottom:1.5rem;">
        <h2 style="margin-bottom:.5rem;">Subscribe &amp; Save</h2>
        <p style="font-size:.875rem;color:var(--g500);margin-bottom:1rem;">
          Save 5% on eligible products automatically. Free to join, cancel any time.
        </p>
        ${_isSub
          ? `<div class="ss-banner" style="margin-bottom:.75rem;">✓ Active — 5% off eligible items at checkout</div>
             <button id="cancelSubBtn" style="background:none;border:none;color:var(--g500);font-size:.875rem;text-decoration:underline;cursor:pointer;">Cancel subscription</button>`
          : `<button class="btn-primary" id="joinSubBtn">Join Subscribe &amp; Save — it's free</button>`}
      </div>

      <h2 style="font-weight:800;margin-bottom:1rem;">Order History</h2>
      ${!orders?.length
        ? `<p style="color:var(--g500)">No orders yet. <a href="/collections" data-nav="/collections" style="color:var(--teal)">Start shopping →</a></p>`
        : orders.map(o => `
          <div class="order-card">
            <div class="order-card-hd">
              <span class="order-num">${esc(o.order_number)}</span>
              <span class="status-badge s-${o.status}">${o.status}</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:.875rem;color:var(--g500);">
              <span>${fmtDate(o.created_at)}</span>
              <span style="font-weight:700;color:var(--g900);">$${parseFloat(o.total).toFixed(2)}</span>
            </div>
          </div>`).join('')}

      <button id="signOutBtn" style="margin-top:2rem;background:none;border:1.5px solid var(--g200);color:var(--g500);padding:.625rem 1.25rem;border-radius:var(--rad);font-size:.875rem;font-weight:700;cursor:pointer;">
        Sign Out
      </button>
    </div>`;

  document.getElementById('joinSubBtn')?.addEventListener('click', joinSub);
  document.getElementById('cancelSubBtn')?.addEventListener('click', cancelSub);
  document.getElementById('signOutBtn')?.addEventListener('click', signOut);
}

async function checkSub() {
  if (!_user) { _isSub = false; return; }
  const { data } = await sb.from('shop_subscribers').select('id').eq('user_id', _user.id).maybeSingle();
  _isSub = !!data;
}

async function joinSub() {
  const { error } = await sb.from('shop_subscribers').insert({ user_id: _user.id, email: _user.email });
  if (error) { toast(error.message, false); return; }
  _isSub = true; toast("You're now a subscriber — 5% off eligible items!");
  document.getElementById('ssBar')?.remove();
  renderAcctDash(document.getElementById('root'));
}

async function cancelSub() {
  if (!confirm('Cancel your Subscribe & Save subscription?')) return;
  await sb.from('shop_subscribers').delete().eq('user_id', _user.id);
  _isSub = false; toast('Subscription cancelled');
  renderAcctDash(document.getElementById('root'));
}

async function signOut() {
  await sb.auth.signOut(); _user = null; _isSub = false;
  document.getElementById('acctLink').textContent = 'Account';
  toast('Signed out'); nav('/');
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
(async function init() {
  const { data: { user } } = await sb.auth.getUser();
  _user = user;
  if (_user) {
    await checkSub();
    document.getElementById('acctLink').textContent = 'My Account';
    if (_isSub) document.getElementById('ssBar')?.classList.add('hidden');
  }
  renderCartBadge();
  route();
})();
  </script>
</body>
</html>
